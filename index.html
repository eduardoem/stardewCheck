<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley - Seguimiento de Pesca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #fdf6e3;
            --bg-card: #ffffff;
            --text-main: #5d4037;
            --border-color: #d7ccc8;
            --accent-color: #7fb3d5;
            --completed-bg: #e8f5e9;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        [data-bs-theme="dark"] {
            --bg-body: #1a1a1a;
            --bg-card: #2d2d2d;
            --text-main: #e0e0e0;
            --border-color: #444444;
            --accent-color: #2980b9;
            --completed-bg: #1b3a1e;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-family);
            transition: background-color 0.2s ease, color 0.2s ease;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--bg-card);
            border-bottom: 2px solid var(--border-color);
        }

        .sticky-tools {
            position: sticky;
            top: 0;
            z-index: 1020;
            background-color: var(--bg-body);
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .mother-category {
            background-color: var(--bg-card);
            border: 2px solid var(--accent-color);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .fish-row {
            display: flex;
            align-items: center;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .fish-row.completed {
            opacity: 0.7;
            background-color: var(--completed-bg);
            order: 2;
        }

        .fish-row:not(.completed) {
            order: 1;
        }

        .fish-list-container {
            display: flex;
            flex-direction: column;
        }

        .lote-tag {
            background-color: rgba(127, 179, 213, 0.15);
            color: var(--text-main);
            border: 1px solid var(--accent-color);
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .form-check-input:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h1 fw-bold" id="app-title">🎣 SV Fish Tracker</span>
            <div class="d-flex gap-2">
                <select id="lang-select" class="form-select form-select-sm" style="width: auto;">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                </select>
                <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" aria-label="Cambiar tema">🌓</button>
            </div>
        </div>
    </nav>

    <div class="sticky-tools mb-4">
        <div class="container">
            <div class="row g-2 align-items-center">
                <div class="col-md-5">
                    <input type="text" id="search-input" class="form-control" placeholder="Buscar pez o lote...">
                </div>
                <div class="col-md-4">
                    <select id="filter-status" class="form-select">
                        <option value="all" id="opt-all">Todos los peces</option>
                        <option value="pending" id="opt-pending">Pendientes</option>
                        <option value="completed" id="opt-completed">Completados</option>
                    </select>
                </div>
                <div class="col-md-3 text-end">
                    <span id="progress-label" class="fw-bold">Progreso:</span>
                    <span id="progress-percent" class="badge bg-secondary ms-1">0%</span>
                </div>
            </div>
        </div>
    </div>

        <div id="fish-app-root"></div>

                            { id: "ghostfish", n: { es: "Pez fantasma", en: "Ghostfish" }, l: { es: "Minas", en: "Mines" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Peces Especiales", en: "Specialty Fish Bundle" } },
                            { id: "woodskip", n: { es: "Muyu", en: "Woodskip" }, l: { es: "Bosque Secreto", en: "Secret Woods" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Peces Especiales", en: "Specialty Fish Bundle" } },
                            { id: "sandfish", n: { es: "Pez arenero", en: "Sandfish" }, l: { es: "Desierto", en: "Desert" }, h: "6am - 8pm", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Peces Especiales", en: "Specialty Fish Bundle" } },
                            { id: "lobster", n: { es: "Langosta", en: "Lobster" }, l: { es: "Mar (Trampa)", en: "Ocean (Crab Pot)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "clam", n: { es: "Almeja", en: "Clam" }, l: { es: "Playa (Recolección)", en: "Beach (Foraging)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "crayfish", n: { es: "Cangrejo de río", en: "Crayfish" }, l: { es: "Agua dulce (Trampa)", en: "Freshwater (Crab Pot)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "crab", n: { es: "Cangrejo", en: "Crab" }, l: { es: "Mar (Trampa) / Minas", en: "Ocean (Crab Pot) / Mines" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "cockle", n: { es: "Berberecho", en: "Cockle" }, l: { es: "Playa (Recolección)", en: "Beach (Foraging)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "mussel", n: { es: "Mejillón", en: "Mussel" }, l: { es: "Playa (Recolección)", en: "Beach (Foraging)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "shrimp", n: { es: "Camarón", en: "Shrimp" }, l: { es: "Mar (Trampa)", en: "Ocean (Crab Pot)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "snail", n: { es: "Caracol", en: "Snail" }, l: { es: "Agua dulce (Trampa)", en: "Freshwater (Crab Pot)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "periwinkle", n: { es: "Bígaro", en: "Periwinkle" }, l: { es: "Agua dulce (Trampa)", en: "Freshwater (Crab Pot)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } },
                            { id: "oyster", n: { es: "Ostra", en: "Oyster" }, l: { es: "Playa (Recolección)", en: "Beach (Foraging)" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Lote Trampa para Cangrejos", en: "Crab Pot Bundle" } }
                        ]
                    }
                ]
            }
        ];

        // Estado de la SPA
        let currentLang = localStorage.getItem("sv_fish_lang") || "es";
        let completedFish = JSON.parse(localStorage.getItem("sv_completed_fish")) || [];
        
        // I18N básico para herramientas de la UI
        const translations = {
            es: {
                title: "🎣 SV Fish Tracker",
                searchPlaceholder: "Buscar pez o lote...",
                optAll: "Todos los peces",
                optPending: "Pendientes",
                optCompleted: "Completados",
                progressLabel: "Progreso:",
                location: "Ubicación",
                time: "Horario",
                weather: "Clima",
                seasons: "Temporadas"
            },
            en: {
                title: "🎣 SV Fish Tracker",
                searchPlaceholder: "Search fish or bundle...",
                optAll: "All fish",
                optPending: "Pending",
                optCompleted: "Completed",
                progressLabel: "Progress:",
                location: "Location",
                time: "Time",
                weather: "Weather",
                seasons: "Seasons"
            }
        };

        // Al iniciar la app
        document.addEventListener("DOMContentLoaded", () => {
            initTheme();
            initLang();
            renderApp();
            
            // Listeners globales
            document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
            document.getElementById("lang-select").addEventListener("change", changeLang);
            document.getElementById("search-input").addEventListener("input", renderApp);
            document.getElementById("filter-status").addEventListener("change", renderApp);
        });

        function initTheme() {
            const savedTheme = localStorage.getItem("sv_theme") || "light";
            document.documentElement.setAttribute("data-bs-theme", savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute("data-bs-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-bs-theme", newTheme);
            localStorage.setItem("sv_theme", newTheme);
        }

        function initLang() {
            const select = document.getElementById("lang-select");
            select.value = currentLang;
            applyUITranslations();
        }

        function changeLang(e) {
            currentLang = e.target.value;
            localStorage.setItem("sv_fish_lang", currentLang);
            applyUITranslations();
            renderApp();
        }

        function applyUITranslations() {
            const t = translations[currentLang];
            document.getElementById("app-title").textContent = t.title;
            document.getElementById("search-input").placeholder = t.searchPlaceholder;
            document.getElementById("opt-all").textContent = t.optAll;
            document.getElementById("opt-pending").textContent = t.optPending;
            document.getElementById("opt-completed").textContent = t.optCompleted;
            document.getElementById("progress-label").textContent = t.progressLabel;
        }

        function toggleFishCompletion(fishId) {
            if (completedFish.includes(fishId)) {
                completedFish = completedFish.filter(id => id !== fishId);
            } else {
                completedFish.push(fishId);
            }
            localStorage.setItem("sv_completed_fish", JSON.stringify(completedFish));
            renderApp();
        }

        function calculateProgress() {
            // Unificamos identificadores únicos de todos los peces disponibles en la base de datos
            const allUniqueFishIds = new Set();
            FISH_DATA.forEach(mother => {
                mother.seasons.forEach(season => {
                    season.fish.forEach(f => allUniqueFishIds.add(f.id));
                });
            });

            const total = allUniqueFishIds.size;
            const userCompletedCount = completedFish.filter(id => allUniqueFishIds.has(id)).length;
            const percentage = total > 0 ? Math.round((userCompletedCount / total) * 100) : 0;

            document.getElementById("progress-percent").textContent = `${percentage}%`;
        }

        function renderApp() {
            const root = document.getElementById("fish-app-root");
            const searchTerm = document.getElementById("search-input").value.toLowerCase().trim();
            const filterStatus = document.getElementById("filter-status").value;

            root.innerHTML = "";
            calculateProgress();

            FISH_DATA.forEach((mother, motherIdx) => {
                let hasValidMotherContent = false;
                
                const motherCard = document.createElement("div");
                motherCard.className = "mother-category";
                
                const h2 = document.createElement("h2");
                h2.className = "h4 mb-4 fw-bold";
                h2.textContent = `${mother.icon} ${mother.mother[currentLang]}`;
                motherCard.appendChild(h2);

                const accordionId = `accordion-mother-${motherIdx}`;
                const accordionContainer = document.createElement("div");
                accordionContainer.className = "accordion";
                accordionContainer.id = accordionId;

                mother.seasons.forEach((season, seasonIdx) => {
                    const collapseId = `collapse-${motherIdx}-${seasonIdx}`;
                    
                    // Filtrar peces de esta temporada específica
                    const filteredFish = season.fish.filter(f => {
                        const isCompleted = completedFish.includes(f.id);
                        
                        // Filtro de estado
                        if (filterStatus === "pending" && isCompleted) return false;
                        if (filterStatus === "completed" && !isCompleted) return false;

                        // Filtro por término de búsqueda (Nombre o Lote)
                        if (searchTerm) {
                            const matchName = f.n[currentLang].toLowerCase().includes(searchTerm);
                            const matchLote = f.lote && f.lote[currentLang].toLowerCase().includes(searchTerm);
                            return matchName || matchLote;
                        }
                        return true;
                    });

                    if (filteredFish.length === 0) return;
                    hasValidMotherContent = true;

                    // Crear Accordion Item por cada Temporada
                    const accItem = document.createElement("div");
                    accItem.className = "accordion-item border-0 mb-3 bg-transparent";

                    const accHeader = document.createElement("h3");
                    accHeader.className = "accordion-header";

                    const accButton = document.createElement("button");
                    accButton.className = "accordion-button collapsed rounded fw-semibold bg-body border";
                    accButton.type = "button";
                    accButton.dataset.bsToggle = "collapse";
                    accButton.dataset.bsTarget = `#${collapseId}`;
                    accButton.ariaExpanded = "false";
                    accButton.textContent = season.name[currentLang];

                    accHeader.appendChild(accButton);
                    accItem.appendChild(accHeader);

                    const accCollapse = document.createElement("div");
                    accCollapse.id = collapseId;
                    accCollapse.className = "accordion-collapse collapse";
                    accCollapse.dataset.bsParent = `#${accordionId}`;

                    const accBody = document.createElement("div");
                    accBody.className = "accordion-body p-1 mt-2 fish-list-container";

                    // Crear filas de cada pez dentro de la temporada
                    filteredFish.forEach(f => {
                        const isDone = completedFish.includes(f.id);
                        
                        const fRow = document.createElement("div");
                        fRow.className = `fish-row d-flex flex-wrap flex-md-nowrap justify-content-between align-items-center ${isDone ? 'completed' : ''}`;
                        
                        // Contenido del pez (Flexbox Responsivo)
                        const infoDiv = document.createElement("div");
                        infoDiv.className = "d-flex align-items-center gap-3 flex-grow-1 flex-wrap";

                        // Checkbox
                        const chkInput = document.createElement("input");
                        chkInput.type = "checkbox";
                        chkInput.className = "form-check-input flex-shrink-0";
                        chkInput.style.width = "22px";
                        chkInput.style.height = "22px";
                        chkInput.checked = isDone;
                        chkInput.addEventListener("change", () => toggleFishCompletion(f.id));

                        const detailsDiv = document.createElement("div");
                        detailsDiv.innerHTML = `
                            <div class="d-flex align-items-center gap-2 flex-wrap">
                                <strong class="fs-5">${f.n[currentLang]}</strong>
                                ${f.lote ? `<span class="${mother.tagClass}">${f.lote[currentLang]}</span>` : ''}
                            </div>
                            <small class="text-muted d-block mt-1">
                                📍 <strong>${translations[currentLang].location}:</strong> ${f.l[currentLang]} | 
                                ⏰ <strong>${translations[currentLang].time}:</strong> ${f.h} | 
                                🌤️ <strong>${translations[currentLang].weather}:</strong> ${f.c[currentLang]} |
                                📅 <strong>${translations[currentLang].seasons}:</strong> ${f.e[currentLang]}
                            </small>
                        `;

                        infoDiv.appendChild(chkInput);
                        infoDiv.appendChild(detailsDiv);
                        fRow.appendChild(infoDiv);
                        accBody.appendChild(fRow);
                    });

                    accCollapse.appendChild(accBody);
                    accItem.appendChild(accCollapse);
                    accordionContainer.appendChild(accItem);
                });

                motherCard.appendChild(accordionContainer);
                if (hasValidMotherContent) {
                    root.appendChild(motherCard);
                }
            });

            // Fallback si no hay peces que coincidan con la búsqueda
            if (root.children.length === 0) {
                const p = document.createElement("p");
                p.className = "text-center text-muted py-5";
                p.textContent = currentLang === "es" ? "No se encontraron resultados" : "No results found";
                root.appendChild(p);
            }
        }
    </script>
</body>
</html>
