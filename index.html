<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Pesca - Multilingüe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sv-bg: #fdf6e3; --sv-panel: #ffffff; --sv-text: #5d4037; --sv-border: #d7ccc8; --sv-accent: #7fb3d5; }
        [data-bs-theme="dark"] { --sv-bg: #1a1a1a; --sv-panel: #2d2d2d; --sv-text: #e0e0e0; --sv-border: #444; --sv-accent: #2980b9; }
        
        body { background-color: var(--sv-bg); color: var(--sv-text); font-family: system-ui, sans-serif; padding-bottom: 30px; }
        .navbar { background-color: var(--sv-accent) !important; border-bottom: 4px solid rgba(0,0,0,0.1); }
        
        .mother-cat { border: 3px solid var(--sv-accent); border-radius: 15px; padding: 15px; margin-bottom: 25px; background: rgba(127, 179, 213, 0.05); }
        .mother-title { font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--sv-accent); margin-bottom: 15px; border-bottom: 2px solid var(--sv-accent); }

        .card-season { background: var(--sv-panel); border: 1px solid var(--sv-border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .season-header { background: rgba(0,0,0,0.03); padding: 10px 15px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .cat-content { display: none; border-top: 1px solid var(--sv-border); }
        .fish-row { display: flex; align-items: center; padding: 10px 15px; border-bottom: 1px solid var(--sv-border); transition: background 0.2s; }
        .fish-row.completed { background: rgba(40, 167, 69, 0.1); opacity: 0.7; }
        .form-check-input { width: 22px; height: 22px; margin-right: 15px; cursor: pointer; }
        .fish-details { font-size: 0.8rem; opacity: 0.9; }
        .tag { font-weight: bold; font-size: 0.75rem; margin-top: 2px; }
        .lote-tag { color: #d35400; }
        .common-tag { color: #27ae60; }
        .legend-tag { color: #8e44ad; }
        
        .sticky-tools { position: sticky; top: 0; z-index: 100; background: var(--sv-bg); padding: 10px 0; border-bottom: 1px solid var(--sv-border); }
    </style>
</head>
<body data-bs-theme="light">

<nav class="navbar navbar-dark mb-2">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold" id="ui-title">Wiki Pesca</span>
        <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-light" onclick="app.toggleLang()" id="ui-lang">🇺🇸 EN</button>
            <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">🌓</button>
        </div>
    </div>
</nav>

<div class="sticky-tools mb-3">
    <div class="container">
        <input type="text" id="search" class="form-control mb-2" oninput="app.filter()">
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-secondary w-100" onclick="app.toggleAll(false)" id="ui-collapse">Colapsar</button>
            <button class="btn btn-sm btn-secondary w-100" onclick="app.toggleAll(true)" id="ui-expand">Expandir</button>
            <button class="btn btn-sm btn-danger w-50" onclick="app.reset()" id="ui-reset">Reset</button>
        </div>
    </div>
</div>

<div class="container" id="main-container"></div>

<script>
const FISH_DATA = [
    {
        mother: { es: "Peces de Lote", en: "Bundle Fish" },
        tagClass: "lote-tag", icon: "📦",
        seasons: [
            { name: { es: "Lotes: Primavera", en: "Bundles: Spring" }, fish: [
                { n: { es: "Pez sol", en: "Sunfish" }, l: { es: "Río", en: "River" }, h: "6am - 7pm", c: { es: "Soleado", en: "Sunny" }, e: { es: "Primavera, Verano", en: "Spring, Summer" }, lote: { es: "Lote Peces Fluviales", en: "River Fish Bundle" } },
                { n: { es: "Pez gato", en: "Catfish" }, l: { es: "Río", en: "River" }, h: "6am - 12am", c: { es: "Lluvia", en: "Rainy" }, e: { es: "Primavera, Otoño", en: "Spring, Fall" }, lote: { es: "Lote Peces Fluviales", en: "River Fish Bundle" } },
                { n: { es: "Sábalo", en: "Shad" }, l: { es: "Río", en: "River" }, h: "9am - 2am", c: { es: "Lluvia", en: "Rainy" }, e: { es: "Prim., Ver., Oto.", en: "Spr., Sum., Fall" }, lote: { es: "Lote Peces Fluviales", en: "River Fish Bundle" } },
                { n: { es: "Sardina", en: "Sardine" }, l: { es: "Océano", en: "Ocean" }, h: "6am - 7pm", c: { es: "Cualquiera", en: "Any" }, e: { es: "Prim., Oto., Inv.", en: "Spr., Fall, Win." }, lote: { es: "Lote Peces Marinos", en: "Ocean Fish Bundle" } },
                { n: { es: "Anguila", en: "Eel" }, l: { es: "Océano", en: "Ocean" }, h: "4pm - 2am", c: { es: "Lluvia", en: "Rainy" }, e: { es: "Primavera, Otoño", en: "Spring, Fall" }, lote: { es: "Lote Peces Nocturnos", en: "Night Fishing Bundle" } }
            ]},
            { name: { es: "Lotes: Verano", en: "Bundles: Summer" }, fish: [
                { n: { es: "Pez globo", en: "Pufferfish" }, l: { es: "Océano", en: "Ocean" }, h: "12pm - 4pm", c: { es: "Sol", en: "Sun" }, e: { es: "Verano", en: "Summer" }, lote: { es: "Lote Peces Especiales", en: "Specialty Fish Bundle" } },
                { n: { es: "Atún", en: "Tuna" }, l: { es: "Océano", en: "Ocean" }, h: "6am - 7pm", c: { es: "Cualquiera", en: "Any" }, e: { es: "Verano, Invierno", en: "Summer, Winter" }, lote: { es: "Lote Peces Marinos", en: "Ocean Fish Bundle" } },
                { n: { es: "Esturión", en: "Sturgeon" }, l: { es: "Lago", en: "Lake" }, h: "6am - 7pm", c: { es: "Cualquiera", en: "Any" }, e: { es: "Verano, Invierno", en: "Summer, Winter" }, lote: { es: "Lote Peces de Lago", en: "Lake Fish Bundle" } },
                { n: { es: "Tilapia", en: "Tilapia" }, l: { es: "Océano", en: "Ocean" }, h: "6am - 2pm", c: { es: "Cualquiera", en: "Any" }, e: { es: "Verano, Otoño", en: "Summer, Fall" }, lote: { es: "Lote Peces Marinos", en: "Ocean Fish Bundle" } },
                { n: { es: "Pargo colorado", en: "Red Snapper" }, l: { es: "Océano", en: "Ocean" }, h: "6am - 7pm", c: { es: "Lluvia", en: "Rainy" }, e: { es: "Verano, Otoño", en: "Summer, Fall" }, lote: { es: "Lote Peces Marinos", en: "Ocean Fish Bundle" } }
            ]}
        ]
    },
    {
        mother: { es: "Peces Comunes", en: "Common Fish" },
        tagClass: "common-tag", icon: "🐟",
        seasons: [
            { name: { es: "Comunes: Temporales", en: "Common: Seasonal" }, fish: [
                { n: { es: "Anchoa", en: "Anchovy" }, l: { es: "Océano", en: "Ocean" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Primavera, Otoño", en: "Spring, Fall" }, lote: { es: "Común", en: "Common" } },
                { n: { es: "Salmonete", en: "Red Mullet" }, l: { es: "Océano", en: "Ocean" }, h: "6am - 7pm", c: { es: "Cualquiera", en: "Any" }, e: { es: "Primavera, Verano", en: "Spring, Summer" }, lote: { es: "Común", en: "Common" } }
            ]},
            { name: { es: "Comunes: Todo el Año", en: "Common: All Year" }, fish: [
                { n: { es: "Barbo", en: "Chub" }, l: { es: "Río/Lago", en: "River/Lake" }, h: "Cualquiera", c: { es: "Cualquiera", en: "Any" }, e: { es: "Todo el año", en: "All Year" }, lote: { es: "Común", en: "Common" } }
            ]}
        ]
    },
    {
        mother: { es: "Peces Legendarios", en: "Legendary Fish" },
        tagClass: "legend-tag", icon: "🏆",
        seasons: [
            { name: { es: "Colección Legendaria", en: "Legendary Collection" }, fish: [
                { n: { es: "Leyenda", en: "Legend" }, l: { es: "Lago", en: "Lake" }, h: "Cualquiera", c: { es: "Lluvia", en: "Rain" }, e: { es: "Primavera", en: "Spring" }, lote: { es: "Legendario", en: "Legendary" } }
            ]}
        ]
    }
];

const app = {
    lang: localStorage.getItem('sdv_lang') || 'es',
    progress: JSON.parse(localStorage.getItem('sdv_master_v5')) || {},

    init() {
        this.renderUI();
        const container = document.getElementById('main-container');
        container.innerHTML = FISH_DATA.map((mother, mIdx) => `
            <div class="mother-cat">
                <div class="mother-title d-flex justify-content-between align-items-center">
                    <span>${mother.mother[this.lang]}</span>
                    <span class="badge bg-secondary rounded-pill" id="mprog-${mIdx}">0%</span>
                </div>
                ${mother.seasons.map((season, sIdx) => {
                    const catId = `${mIdx}-${sIdx}`;
                    return `
                    <div class="card-season" data-cat-id="${catId}">
                        <div class="season-header" onclick="app.toggleCat('${catId}')">
                            <span>${season.name[this.lang]}</span>
                            <span class="badge bg-primary rounded-pill progress-text">0%</span>
                        </div>
                        <div id="cat-${catId}" class="cat-content">
                            ${season.fish.map((f, fIdx) => {
                                const id = `${mIdx}-${sIdx}-${fIdx}`;
                                const isDone = !!this.progress[id];
                                return `
                                <div class="fish-row ${isDone ? 'completed' : ''}" 
                                     data-search="${f.n.es.toLowerCase()} ${f.n.en.toLowerCase()} ${f.e[this.lang].toLowerCase()}">
                                    <input class="form-check-input" type="checkbox" id="${id}" 
                                           ${isDone ? 'checked' : ''} onchange="app.updateFish('${id}')">
                                    <div class="flex-grow-1">
                                        <label class="fw-bold d-block" for="${id}">${f.n[this.lang]}</label>
                                        <div class="fish-details">
                                            <strong>${this.lang === 'es' ? 'Estación' : 'Season'}:</strong> ${f.e[this.lang]}<br>
                                            📍 ${f.l[this.lang]} | ⏰ ${f.h} | ☁️ ${f.c[this.lang]}
                                        </div>
                                        <div class="tag ${mother.tagClass}">${mother.icon} ${f.lote[this.lang]}</div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                }).join('')}
            </div>
        `).join('');
        this.updateAllProgress();
    },

    renderUI() {
        const texts = {
            es: { title: "Wiki Pesca", lang: "🇺🇸 EN", search: "Buscar pez, estación...", coll: "Colapsar", exp: "Expandir", reset: "Reset" },
            en: { title: "Fishing Wiki", lang: "🇪🇸 ES", search: "Search fish, season...", coll: "Collapse", exp: "Expand", reset: "Reset" }
        };
        const t = texts[this.lang];
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('ui-lang').innerText = t.lang;
        document.getElementById('search').placeholder = t.search;
        document.getElementById('ui-collapse').innerText = t.coll;
        document.getElementById('ui-expand').innerText = t.exp;
        document.getElementById('ui-reset').innerText = t.reset;
    },

    toggleLang() {
        this.lang = this.lang === 'es' ? 'en' : 'es';
        localStorage.setItem('sdv_lang', this.lang);
        this.init();
    },

    updateFish(id) {
        const cb = document.getElementById(id);
        const row = cb.closest('.fish-row');
        this.progress[id] = cb.checked;
        localStorage.setItem('sdv_master_v5', JSON.stringify(this.progress));
        row.classList.toggle('completed', cb.checked);
        const [mIdx, sIdx] = id.split('-');
        this.updateCatProgress(`${mIdx}-${sIdx}`);
        this.updateMotherProgress(mIdx);
    },

    updateCatProgress(catId) {
        const catEl = document.querySelector(`[data-cat-id="${catId}"]`);
        const total = catEl.querySelectorAll('.form-check-input').length;
        const checked = catEl.querySelectorAll('.form-check-input:checked').length;
        catEl.querySelector('.progress-text').innerText = Math.round((checked / total) * 100) + '%';
    },

    updateMotherProgress(mIdx) {
        const motherEl = document.getElementsByClassName('mother-cat')[mIdx];
        const total = motherEl.querySelectorAll('.form-check-input').length;
        const checked = motherEl.querySelectorAll('.form-check-input:checked').length;
        document.getElementById(`mprog-${mIdx}`).innerText = Math.round((checked / total) * 100) + '%';
    },

    updateAllProgress() {
        FISH_DATA.forEach((m, mIdx) => {
            m.seasons.forEach((s, sIdx) => this.updateCatProgress(`${mIdx}-${sIdx}`));
            this.updateMotherProgress(mIdx);
        });
    },

    filter() {
        const q = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.fish-row').forEach(row => {
            const match = row.dataset.search.includes(q);
            row.style.display = match ? 'flex' : 'none';
        });
    },

    toggleCat(id) {
        const el = document.getElementById(`cat-${id}`);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    },

    toggleAll(show) {
        document.querySelectorAll('.cat-content').forEach(el => el.style.display = show ? 'block' : 'none');
    },

    reset() {
        if(confirm(this.lang === 'es' ? "¿Borrar todo?" : "Clear all?")) {
            this.progress = {};
            localStorage.removeItem('sdv_master_v5');
            location.reload();
        }
    }
};

function toggleTheme() {
    const b = document.body;
    b.setAttribute('data-bs-theme', b.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
}

document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
