<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley - Checklist Maestro con Progreso</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#7fb3d5">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sv-bg: #fdf6e3; --sv-header: #d1e8e2; --sv-text: #5d4037; --sv-border: #d7ccc8; --sv-accent: #ffdfba; --cb-border: #888; }
        [data-bs-theme="dark"] { --sv-bg: #2d2d2d; --sv-header: #3e4a59; --sv-text: #e0e0e0; --sv-border: #555; --sv-accent: #5d4037; --cb-border: #666; }
        body { background-color: var(--sv-bg); color: var(--sv-text); font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.3s ease; }
        .navbar { background-color: #7fb3d5 !important; border-bottom: 3px solid #5499c7; }
        .room-card { border: 1px solid var(--sv-border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; background: var(--sv-bg); }
        .room-header { background-color: var(--sv-header); color: #2c3e50; padding: 12px 20px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .bundle-title { color: #8d6e63; font-weight: 700; margin-top: 10px; border-bottom: 2px solid var(--sv-accent); }
        .form-check-input { border: 2px solid var(--cb-border) !important; cursor: pointer; width: 1.1em; height: 1.1em; }
        .form-check-input:checked { background-color: #7fb3d5; border-color: #5499c7 !important; }
        .info-captura { font-size: 0.75rem; color: #6c757d; display: block; }
        .completed { text-decoration: line-through; opacity: 0.5; }
        .sticky-toolbar { position: sticky; top: 0; z-index: 1000; background: var(--sv-bg); padding: 15px 0; border-bottom: 1px solid var(--sv-border); }
        .btn-pastel { background-color: #b2d8d8; border: none; color: #2c3e50; }
        .progress-badge { font-size: 0.85rem; padding: 5px 10px; border-radius: 20px; background: #7fb3d5; color: white; min-width: 60px; text-align: center; }
    </style>
</head>
<body data-bs-theme="light">

    <nav class="navbar navbar-dark shadow-sm">
        <div class="container"><span class="navbar-brand mb-0 h1">Stardew Checklist Maestro</span>
        <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">🌓 Modo</button></div>
    </nav>

    <div class="sticky-toolbar">
        <div class="container">
            <div class="row g-2">
                <div class="col-md-6"><input type="text" id="searchInput" class="form-control" placeholder="Buscar ítems o lotes..." oninput="filter()"></div>
                <div class="col-6 col-md-2"><button class="btn btn-pastel w-100 btn-sm" onclick="toggleAll(true)">Expandir</button></div>
                <div class="col-6 col-md-2"><button class="btn btn-secondary w-100 btn-sm" onclick="toggleAll(false)">Colapsar</button></div>
                <div class="col-md-2"><button class="btn btn-danger w-100 btn-sm" onclick="reset()">Reset</button></div>
            </div>
        </div>
    </div>

    <div class="container mt-4 pb-5" id="render-area"></div>

        function render() {
            const area = document.getElementById('render-area');
            area.innerHTML = wikiData.map((sala, sIdx) => `
                <div class="room-card shadow-sm" data-sala="${sala.sala.toLowerCase()}">
                    <div class="room-header" data-bs-toggle="collapse" data-bs-target="#col-${sIdx}">
                        <div>${sala.sala}</div>
                        <div class="progress-badge" id="badge-${sIdx}">0%</div>
                    </div>
                    <div id="col-${sIdx}" class="collapse show p-3 room-content" data-room-index="${sIdx}">
                        <div class="row">${sala.lotes.map(lote => `
                            <div class="col-md-6 mb-3 bundle-wrap" data-lote="${lote.nombre.toLowerCase()}">
                                <div class="bundle-title mb-2">${lote.nombre}</div>
                                ${lote.items.map(item => `
                                    <div class="form-check item-wrap" data-item="${item.n.toLowerCase()}">
                                        <input class="form-check-input" type="checkbox" id="${item.n.replace(/[^\w]/g, '')}" onchange="save(this)">
                                        <label class="form-check-label" for="${item.n.replace(/[^\w]/g, '')}">
                                            <strong>${item.n}</strong>
                                            ${item.i ? `<span class="info-captura">${item.i}</span>` : ''}
                                        </label>
                                    </div>
                                `).join('')}
                            </div>
                        `).join('')}</div>
                    </div>
                </div>
            `).join('');
            load();
            updateAllProgress();
        }

        function updateProgress(roomIdx) {
            const container = document.querySelector(`[data-room-index="${roomIdx}"]`);
            if (!container) return;
            const total = container.querySelectorAll('.form-check-input').length;
            const checked = container.querySelectorAll('.form-check-input:checked').length;
            const percent = total > 0 ? Math.round((checked / total) * 100) : 0;
            document.getElementById(`badge-${roomIdx}`).innerText = `${percent}%`;
        }

        function updateAllProgress() {
            wikiData.forEach((_, idx) => updateProgress(idx));
        }
