<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley - Guía de Pesca PDF</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7fb3d5">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sv-bg: #fdf6e3; --sv-header: #d1e8e2; --sv-text: #5d4037; --sv-border: #d7ccc8; }
        [data-bs-theme="dark"] { --sv-bg: #2d2d2d; --sv-header: #3e4a59; --sv-text: #e0e0e0; --sv-border: #555; }
        body { background-color: var(--sv-bg); color: var(--sv-text); font-family: system-ui, -apple-system, sans-serif; padding-bottom: 50px; }
        .navbar { background-color: #7fb3d5 !important; border-bottom: 3px solid #5499c7; }
        .room-card { border: 1px solid var(--sv-border); border-radius: 10px; margin-bottom: 15px; background: var(--sv-bg); overflow: hidden; }
        .room-header { background-color: var(--sv-header); padding: 12px 20px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .fish-item { padding: 12px 15px; border-bottom: 1px solid var(--sv-border); display: flex; align-items: flex-start; }
        .fish-content { margin-left: 15px; }
        .form-check-input { width: 24px; height: 24px; border: 2px solid #8d6e63 !important; flex-shrink: 0; }
        .completed { opacity: 0.5; background: rgba(0,0,0,0.03); }
        .strikethrough { text-decoration: line-through; }
        .sticky-toolbar { position: sticky; top: 0; z-index: 1000; background: var(--sv-bg); padding: 10px 0; border-bottom: 2px solid var(--sv-border); }
    </style>
</head>
<body data-bs-theme="light">

    <nav class="navbar navbar-dark">
        <div class="container"><span class="navbar-brand mb-0 h1">Guía de Pesca (Literal PDF)</span>
        <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">🌓 Modo</button></div>
    </nav>

    <div class="sticky-toolbar">
        <div class="container">
            <div class="row g-2">
                <div class="col-12 mb-1"><input type="text" id="searchInput" class="form-control" placeholder="Buscar pez..." oninput="filter()"></div>
                <div class="col-6"><button class="btn btn-secondary w-100 btn-sm" onclick="toggleAll(false)">Colapsar Todo</button></div>
                <div class="col-6"><button class="btn btn-danger w-100 btn-sm" onclick="reset()">Reset</button></div>
            </div>
        </div>
    </div>

    <div class="container mt-3" id="app"></div>

    <script>
        const fishData = [
            { cat: "Río", peces: ["Paz sol", "Pez gato", "Sabalo", "Trucha tigre", "Besugo", "Lucio", "Bacalao largo", "Salmón"] },
            { cat: "Océano", peces: ["Sardina", "Atún", "Pargo colorado", "Tilapia", "Pez globo", "Pulpo", "Superpepino", "Anguilla", "Pepino de mar", "Calamar"] },
            { cat: "Lago de la montaña", peces: ["Perca", "Carpa", "Siluro", "Esturión", "Lucio"] },
            { cat: "Especiales", peces: ["Muyu", "Pez fantasma", "Paz carambano", "Anguilla de lava", "Pez piedra", "Lenguado"] },
            { cat: "Leyendas", peces: ["Leyenda", "Paz carmesi", "Rape", "Pez glacial", "Carpa mutante"] }
        ];

        function initApp() {
            const container = document.getElementById('app');
            container.innerHTML = fishData.map((cat, idx) => `
                <div class="room-card">
                    <div class="room-header" onclick="toggleCollapse(${idx})">
                        <span>${cat.cat}</span>
                        <span class="badge bg-info" id="badge-${idx}">0%</span>
                    </div>
                    <div id="cat-${idx}" style="display: none">
                        ${cat.peces.map(p => {
                            const id = p.replace(/\s/g, '') + idx;
                            return `
                            <div class="fish-item">
                                <input class="form-check-input" type="checkbox" id="${id}" onchange="save()">
                                <div class="fish-content">
                                    <label class="fw-bold" for="${id}">${p}</label>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`).join('');
            load();
        }

        function save() {
            const status = {};
            document.querySelectorAll('.form-check-input').forEach(cb => {
                status[cb.id] = cb.checked;
                cb.closest('.fish-item').classList.toggle('completed', cb.checked);
            });
            localStorage.setItem('sdv_fish_pdf', JSON.stringify(status));
            updateProgress();
        }

        function load() {
            const data = JSON.parse(localStorage.getItem('sdv_fish_pdf') || '{}');
            Object.keys(data).forEach(id => {
                const cb = document.getElementById(id);
                if (cb) {
                    cb.checked = data[id];
                    cb.closest('.fish-item').classList.toggle('completed', data[id]);
                }
            });
            updateProgress();
        }

        function updateProgress() {
            fishData.forEach((_, idx) => {
                const el = document.getElementById(`cat-${idx}`);
                const total = el.querySelectorAll('input').length;
                const checked = el.querySelectorAll('input:checked').length;
                document.getElementById(`badge-${idx}`).innerText = Math.round((checked/total)*100) + '%';
            });
        }

        function toggleCollapse(idx) {
            const el = document.getElementById(`cat-${idx}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function toggleAll(show) {
            document.querySelectorAll('[id^="cat-"]').forEach(el => el.style.display = show ? 'block' : 'none');
        }

        function reset() {
            if(confirm("¿Borrar progreso?")) { localStorage.removeItem('sdv_fish_pdf'); location.reload(); }
        }

        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-bs-theme', b.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
