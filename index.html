<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley - Fishing Checklist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bs-body-bg: #121212;
            --bs-body-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #2d2d2d;
        }
        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
        }
        .card {
            background-color: var(--card-bg);
            border-color: var(--border-color);
        }
        .fish-img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .completed {
            opacity: 0.5;
            text-decoration: line-through;
        }
        .badge-info {
            font-size: 0.75rem;
            font-weight: normal;
        }
    </style>
</head>
<body class="py-4">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">🎣 Stardew Valley Checklist</h1>
            <span class="badge bg-primary fs-6" id="progress-badge">0% Completado</span>
        </div>

        <div class="mb-4">
            <input type="text" id="search-input" class="form-control form-control-lg bg-dark text-light border-secondary" placeholder="Buscar por nombre, zona, estación o clima...">
        </div>

        <div class="accordion accordion-flush" id="checklist-accordion">
            
            <div class="accordion-item bg-transparent border-secondary">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-dark text-light border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-bundles">
                        📦 Peces del Centro Cívico
                    </button>
                </h2>
                <div id="collapse-bundles" class="accordion-collapse collapse show" data-bs-parent="#checklist-accordion">
                    <div class="accordion-body p-2" id="list-bundles"></div>
                </div>
            </div>

            <div class="accordion-item bg-transparent border-secondary mt-3">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-dark text-light border-secondary collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-common">
                        🐟 Peces Comunes
                    </button>
                </h2>
                <div id="collapse-common" class="accordion-collapse collapse" data-bs-parent="#checklist-accordion">
                    <div class="accordion-body p-2" id="list-common"></div>
                </div>
            </div>

            <div class="accordion-item bg-transparent border-secondary mt-3">
                <h2 class="accordion-header">
                    <button class="accordion-button bg-dark text-light border-secondary collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-legendary">
                        👑 Peces Legendarios
                    </button>
                </h2>
                <div id="collapse-legendary" class="accordion-collapse collapse" data-bs-parent="#checklist-accordion">
                    <div class="accordion-body p-2" id="list-legendary"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Array de datos completo con las URLs de la Wiki oficial de Stardew Valley corregidas

            {
                id: "sunfish",

            },
            {

                category: "bundles",
                location: "River (Pelican Town/Cindersap Forest), Secret Woods",

                weather: "Rainy",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/c/c8/Catfish.png"
            },
            {
                id: "shad",

                category: "bundles",
                location: "River (Pelican Town/Cindersap Forest)",
                time: "9 AM - 2 AM",

                weather: "Rainy",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/e/ef/Shad.png"
            },
            {
                id: "tiger-trout",

                location: "River (Pelican Town/Cindersap Forest)",
                time: "6 AM - 7 PM",
                season: "Fall, Winter",

                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/0/01/Tiger_Trout.png"
            },
            {
                id: "largemouth-bass",
                name: "Largemouth Bass",
                category: "bundles",
                location: "Mountain Lake",
                time: "6 AM - 7 PM",
                season: "All Seasons",
                weather: "Any",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/4/43/Largemouth_Bass.png"
            },
            {
                id: "carp",
                name: "Carp",
                category: "bundles",
                location: "Mountain Lake, Secret Woods, Sewers",
                time: "Anytime",
                season: "Spring, Summer, Fall",

                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/a/a8/Carp.png"

            {

                time: "Anytime",

                weather: "Any",

            },
            {

                name: "Sturgeon",
                category: "bundles",

            {

            // PECES COMUNES
            {
                id: "herring",
                name: "Herring",
                category: "common",
                location: "Ocean",
                time: "Anytime",

                weather: "Any",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/f/f1/Herring.png"
            },
            {
                id: "lingcod",
                name: "Lingcod",
                category: "common",
                location: "River, Mountain Lake",
                time: "Anytime",
                season: "Winter",
                weather: "Any",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/a/a2/Lingcod.png"
            },
            {
                id: "salmon",
                name: "Salmon",
                category: "common",
                location: "River",
                time: "6 AM - 7 PM",
                season: "Fall",
                weather: "Any",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/e/e0/Salmon.png"
            },

            // PECES LEGENDARIOS
            {
                id: "angler",
                name: "Angler",
                category: "legendary",
                location: "Wooden plank bridge north of JojaMart",
                time: "Anytime",
                season: "Fall",
                weather: "Any",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/ffd/Angler.png"
            },
            {
                id: "crimsonfish",
                name: "Crimsonfish",
                category: "legendary",
                location: "East Pier on the Beach (requires 300 wood bridge repair)",
                time: "Anytime",
                season: "Summer",
                weather: "Any",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/d/dc/Crimsonfish.png"
            },
            {
                id: "legend",
                name: "Legend",
                category: "legendary",
                location: "Mountain Lake (near log)",
                time: "Anytime",
                season: "Spring",
                weather: "Rainy",
                imgUrl: "https://stardewvalleywiki.com/mediawiki/images/1/10/Legend.png"
            }
        ];

        // Inicialización y persistencia
        let checkedFish = JSON.parse(localStorage.getItem('stardew_checked_fish')) || [];

        function saveToStorage() {
            localStorage.setItem('stardew_checked_fish', JSON.stringify(checkedFish));
        }

        function calculateProgress() {
            if (fishData.length === 0) return;
            const percentage = Math.round((checkedFish.length / fishData.length) * 100);
            const badge = document.getElementById('progress-badge');
            badge.textContent = `${percentage}% Completado`;
        }

        // Renderizado del DOM
        function renderChecklist(filterText = "") {
            const listBundles = document.getElementById('list-bundles');
            const listCommon = document.getElementById('list-common');
            const listLegendary = document.getElementById('list-legendary');

            // Limpiar listas anteriores
            listBundles.innerHTML = "";
            listCommon.innerHTML = "";
            listLegendary.innerHTML = "";

            const normalizedFilter = filterText.toLowerCase().trim();

            fishData.forEach(fish => {
                // Filtro de búsqueda
                const matchesSearch = 
                    fish.name.toLowerCase().includes(normalizedFilter) ||
                    fish.location.toLowerCase().includes(normalizedFilter) ||
                    fish.season.toLowerCase().includes(normalizedFilter) ||
                    fish.weather.toLowerCase().includes(normalizedFilter);

                if (!matchesSearch) return;

                const isChecked = checkedFish.includes(fish.id);

                const card = document.createElement('div');
                card.className = `card mb-2 border-secondary ${isChecked ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="card-body d-flex align-items-center justify-content-between p-2">
                        <div class="d-flex align-items-center">
                            <input class="form-check-input me-3 bg-dark border-secondary fish-checkbox" type="checkbox" value="${fish.id}" ${isChecked ? 'checked' : ''} style="width: 24px; height: 24px;">
                            <img src="${fish.imgUrl}" alt="${fish.name}" class="fish-img me-3">
                            <div>
                                <h6 class="mb-0 fs-6 fw-bold">${fish.name}</h6>
                                <p class="mb-0 badge-info text-secondary">
                                    📍 ${fish.location} | ⏰ ${fish.time} <br>
                                    📅 ${fish.season} | ☁️ ${fish.weather}
                                </p>
                            </div>
                        </div>
                    </div>
                `;

                // Asignar a su contenedor correspondiente
                if (fish.category === "bundles") listBundles.appendChild(card);
                else if (fish.category === "common") listCommon.appendChild(card);
                else if (fish.category === "legendary") listLegendary.appendChild(card);
            });

            calculateProgress();
        }

        // Manejador de eventos para checkboxes
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('fish-checkbox')) {
                const fishId = e.target.value;
                const card = e.target.closest('.card');

                if (e.target.checked) {
                    if (!checkedFish.includes(fishId)) checkedFish.push(fishId);
                    card.classList.add('completed');
                } else {
                    checkedFish = checkedFish.filter(id => id !== fishId);
                    card.classList.remove('completed');
                }

                saveToStorage();
                calculateProgress();
            }
        });

        // Evento barra de búsqueda
        document.getElementById('search-input').addEventListener('input', function(e) {
            renderChecklist(e.target.value);
        });

        // Carga inicial
        window.addEventListener('DOMContentLoaded', () => {
            renderChecklist();
        });
    </script>
</body>
</html>
