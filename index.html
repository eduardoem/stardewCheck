<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki Pesca</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7fb3d5">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root { --bg:#fdf6e3; --text:#5d4037; --accent:#7fb3d5;}
[data-bs-theme="dark"] { --bg:#1a1a1a; --text:#eee; --accent:#2980b9;}

body {background:var(--bg); color:var(--text);}
.navbar {background:var(--accent)!important;}

.row-fish {display:flex; align-items:center; padding:8px; border-bottom:1px solid #ccc;}
.row-fish.done {background:#28a74522;}
.icon {width:30px; margin-right:10px;}
</style>
</head>

<body data-bs-theme="light">

<nav class="navbar navbar-dark">
<div class="container d-flex justify-content-between">
<span class="navbar-brand">Wiki Pesca</span>
<div>
<button class="btn btn-sm btn-outline-light" onclick="app.toggleLang()">🌐</button>
<button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">🌓</button>
</div>
</div>
</nav>

<div class="container mt-3">
<input id="search" class="form-control mb-3" placeholder="Buscar..." oninput="app.filter()">

<div id="app"></div>
</div>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
