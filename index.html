<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Pesca - Stardew Valley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body data-bs-theme="light">

    <nav class="navbar navbar-dark mb-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold" id="ui-title">Wiki Pesca</span>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-light fw-bold" onclick="app.toggleLang()" id="ui-lang">🇺🇸 EN</button>
                <button class="btn btn-sm btn-outline-light" onclick="app.toggleTheme()">🌓</button>
            </div>
        </div>
    </nav>

    <div class="sticky-tools mb-4">
        <div class="container">
            <input type="text" id="search" class="form-control mb-3" oninput="app.filter()" placeholder="Buscar pez, estación o ubicación...">
            <div class="row g-2">
                <div class="col">
                    <button class="btn btn-sm btn-secondary w-100 fw-semibold" onclick="app.toggleAll(false)" id="ui-collapse">Colapsar</button>
                </div>
                <div class="col">
                    <button class="btn btn-sm btn-secondary w-100 fw-semibold" onclick="app.toggleAll(true)" id="ui-expand">Expandir</button>
                </div>
                <div class="col-3 col-sm-2">
                    <button class="btn btn-sm btn-danger w-100 fw-semibold" onclick="app.reset()" id="ui-reset">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <main class="container" id="main-container"></main>

    <script src="app.js"></script>
</body>
</html>
