<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardew Valley - Centro Cívico Maestro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7fb3d5">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --sv-bg: #fdf6e3; --sv-header: #d1e8e2; --sv-text: #5d4037; --sv-border: #d7ccc8; --sv-accent: #ffdfba; }
        [data-bs-theme="dark"] { --sv-bg: #2d2d2d; --sv-header: #3e4a59; --sv-text: #e0e0e0; --sv-border: #555; --sv-accent: #5d4037; }
        body { background-color: var(--sv-bg); color: var(--sv-text); font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.3s ease; min-height: 100vh; padding-bottom: 50px; }
        .navbar { background-color: #7fb3d5 !important; border-bottom: 3px solid #5499c7; }
        .room-card { border: 1px solid var(--sv-border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; background: var(--sv-bg); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .room-header { background-color: var(--sv-header); color: #2c3e50; padding: 15px 20px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--sv-border); }
        .bundle-title { color: #8d6e63; font-weight: 700; margin-top: 15px; border-bottom: 2px solid var(--sv-accent); padding-bottom: 5px; }
        .form-check { padding: 8px 12px; border-radius: 5px; transition: background 0.2s; }
        .form-check:hover { background: rgba(0,0,0,0.03); }
        .form-check-input { border: 2px solid #888 !important; cursor: pointer; scale: 1.2; margin-right: 10px; }
        .form-check-input:checked { background-color: #7fb3d5; border-color: #5499c7 !important; }
        .completed { text-decoration: line-through; opacity: 0.5; background: rgba(0,0,0,0.05); }
        .sticky-toolbar { position: sticky; top: 0; z-index: 1000; background: var(--sv-bg); padding: 15px 0; border-bottom: 2px solid var(--sv-border); margin-bottom: 20px; }
        .progress-badge { font-size: 0.9rem; padding: 5px 12px; border-radius: 20px; background: #5499c7; color: white; font-weight: bold; }
    </style>
</head>
<body data-bs-theme="light">

    <nav class="navbar navbar-dark">
        <div class="container"><span class="navbar-brand mb-0 h1">Stardew Checklist Maestro</span>
        <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">🌓 Modo</button></div>
    </nav>

    <div class="sticky-toolbar">
        <div class="container">
            <div class="row g-2">
                <div class="col-md-6"><input type="text" id="searchInput" class="form-control" placeholder="Buscar por ítem o lote..." oninput="filter()"></div>
                <div class="col-6 col-md-3"><button class="btn btn-info w-100 btn-sm text-white" onclick="toggleAll(true)">Expandir</button></div>
                <div class="col-6 col-md-3"><button class="btn btn-danger w-100 btn-sm" onclick="reset()">Reset Datos</button></div>
            </div>
        </div>
    </div>

    <div class="container" id="app"></div>

    <script>
        const wikiData = [
            { sala: "Sala de Manualidades", lotes: [
                { n: "Recolección Primaveral", i: ["Rábano silvestre", "Narciso", "Puerro", "Diente de león"] },
                { n: "Recolección Veraniega", i: ["Uva", "Baya especiada", "Guisante dulce"] },
                { n: "Recolección Otoñal", i: ["Avellana", "Seta común", "Ciruela silvestre", "Mora"] },
                { n: "Recolección Invernal", i: ["Raíz invernal", "Fruta de cristal", "Ñame nival", "Azafrán"] },
                { n: "Construcción", i: ["Madera (99)", "Madera (99)", "Piedra (99)", "Madera noble (10)"] },
                { n: "Recolección Exótica", i: ["Coco", "Fruta de cactus", "Zanahoria de cueva", "Seta roja", "Seta lila", "Jarabe de arce", "Resina de roble", "Brea de pino", "Colmenilla"] }
            ]},
            { sala: "Alacena", lotes: [
                { n: "Cultivos de Primavera", i: ["Chirivía", "Judía verde", "Coliflor", "Patata"] },
                { n: "Cultivos de Verano", i: ["Tomate", "Chile", "Arándano", "Melón"] },
                { n: "Cultivos de Otoño", i: ["Maíz", "Berenjena", "Calabaza", "Ñame"] },
                { n: "Cultivos de Calidad", i: ["Chirivía (5 Oro)", "Maíz (5 Oro)", "Melón (5 Oro)", "Calabaza (5 Oro)"] },
                { n: "Animales", i: ["Leche grande", "Huevo grande (blanco)", "Huevo grande (marrón)", "Leche de cabra grande", "Lana", "Huevo de pato"] },
                { n: "Artesanal", i: ["Aceite de trufa", "Tela", "Queso de cabra", "Queso", "Miel", "Mermelada", "Manzana", "Albaricoque", "Naranja", "Melocotón", "Granada", "Cereza"] }
            ]},
            { sala: "Pecera", lotes: [
                { n: "Peces Fluviales", i: ["Pez sol", "Pez gato", "Sábalo", "Trucha tigre"] },
                { n: "Peces de Lago", i: ["Perca", "Carpa", "Siluro", "Esturión"] },
                { n: "Peces Marinos", i: ["Sardina", "Atún", "Pargo colorado", "Tilapia"] },
                { n: "Peces Nocturnos", i: ["Lucio", "Besugo", "Anguila"] },
                { n: "Trampa para Cangrejos", i: ["Langosta", "Cangrejo de río", "Cangrejo", "Berberecho", "Mejillón", "Gamba", "Caracol", "Bígaro", "Ostra", "Almeja"] },
                { n: "Especialidad de Pesca", i: ["Pez globo", "Pez fantasma", "Lenguado", "Muyu"] }
            ]},
            { sala: "Caldera", lotes: [
                { n: "Herrero", i: ["Barra de cobre", "Barra de hierro", "Barra de oro"] },
                { n: "Geólogo", i: ["Cuarzo", "Cristal de tierra", "Lágrima helada", "Cuarzo de fuego"] },
                { n: "Aventurero", i: ["Baba (99)", "Ala de murciélago (10)", "Esencia solar", "Esencia del vacío"] }
            ]},
            { sala: "Tablón de Anuncios", lotes: [
                { n: "Chef", i: ["Trufa", "Amapola", "Maki", "Huevo frito", "Helecho", "Cangrejo"] },
                { n: "Tinte", i: ["Seta roja", "Erizo de mar", "Girasol", "Pluma de pato", "Agua marina", "Col lombarda"] },
                { n: "Estudio de Campo", i: ["Seta lila", "Concha de nautilo", "Barbo", "Geoda de hielo"] },
                { n: "Forraje", i: ["Arroz", "Trigo", "Maíz"] },
                { n: "Enólogo", i: ["Vino", "Zumo de remolacha", "Encurtidos", "Mermelada"] }
            ]},
            { sala: "Caja Fuerte", lotes: [
                { n: "Pagos de Oro", i: ["2.500 oro", "5.000 oro", "10.000 oro", "25.000 oro"] }
            ]}
        ];

        function initApp() {
            const container = document.getElementById('app');
            let html = '';
            wikiData.forEach((sala, sIdx) => {
                html += `
                <div class="room-card" data-sala="${sala.sala.toLowerCase()}">
                    <div class="room-header" onclick="toggleCollapse(${sIdx})">
                        <span>${sala.sala}</span>
                        <span class="progress-badge" id="badge-${sIdx}">0%</span>
                    </div>
                    <div id="room-${sIdx}" class="p-3">
                        <div class="row">
                        ${sala.lotes.map(lote => `
                            <div class="col-md-6 mb-3 bundle-wrap" data-lote="${lote.n.toLowerCase()}">
                                <div class="bundle-title">${lote.n}</div>
                                ${lote.i.map(item => {
                                    const id = item.replace(/[^\w]/g, '') + sIdx;
                                    return `
                                    <div class="form-check item-wrap" data-item="${item.toLowerCase()}">
                                        <input class="form-check-input" type="checkbox" id="${id}" onchange="save()">
                                        <label class="form-check-label" for="${id}">${item}</label>
                                    </div>`;
                                }).join('')}
                            </div>
                        `).join('')}
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            load();
            updateAllProgress();
        }

        function save() {
            const status = {};
            document.querySelectorAll('.form-check-input').forEach(cb => {
                status[cb.id] = cb.checked;
                cb.parentElement.classList.toggle('completed', cb.checked);
            });
            localStorage.setItem('sdv_master_v2', JSON.stringify(status));
            updateAllProgress();
        }

        function load() {
            const data = JSON.parse(localStorage.getItem('sdv_master_v2') || '{}');
            Object.keys(data).forEach(id => {
                const cb = document.getElementById(id);
                if (cb) {
                    cb.checked = data[id];
                    cb.parentElement.classList.toggle('completed', data[id]);
                }
            });
        }

        function updateAllProgress() {
            wikiData.forEach((_, idx) => {
                const room = document.getElementById(`room-${idx}`);
                const total = room.querySelectorAll('.form-check-input').length;
                const checked = room.querySelectorAll('.form-check-input:checked').length;
                const percent = Math.round((checked / total) * 100);
                document.getElementById(`badge-${idx}`).innerText = `${percent}%`;
            });
        }

        function filter() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.room-card').forEach(card => {
                let roomMatch = false;
                card.querySelectorAll('.bundle-wrap').forEach(bundle => {
                    let bundleMatch = false;
                    bundle.querySelectorAll('.item-wrap').forEach(item => {
                        const match = item.dataset.item.includes(q) || bundle.dataset.lote.includes(q) || card.dataset.sala.includes(q);
                        item.style.display = match ? 'block' : 'none';
                        if (match) bundleMatch = true;
                    });
                    bundle.style.display = bundleMatch ? 'block' : 'none';
                    if (bundleMatch) roomMatch = true;
                });
                card.style.display = roomMatch ? 'block' : 'none';
            });
        }

        function toggleCollapse(idx) {
            const el = document.getElementById(`room-${idx}`);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function toggleAll(show) {
            document.querySelectorAll('[id^="room-"]').forEach(el => el.style.display = show ? 'block' : 'none');
        }

        function reset() {
            if(confirm("¿Borrar todo el progreso?")) {
                localStorage.removeItem('sdv_master_v2');
                location.reload();
            }
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-bs-theme');
            document.body.setAttribute('data-bs-theme', current === 'dark' ? 'light' : 'dark');
        }

        document.addEventListener('DOMContentLoaded', initApp);
        // Fallback en caso de que DOMContentLoaded ya haya pasado
        if (document.readyState === "complete" || document.readyState === "interactive") { initApp(); }
    </script>
</body>
</html>
